<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PitStop — EV Site Scoring</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <header id="topbar">
    <div id="brand">
      <svg id="brand-logo" viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="3" width="10" height="18" rx="1.5" stroke="#34d399" stroke-width="1.6"/>
        <path d="M14 8h3a2 2 0 0 1 2 2v7a1.5 1.5 0 0 0 3 0v-6l-2-2" stroke="#34d399" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="6.5" y="5.5" width="5" height="4" rx="0.5" stroke="#34d399" stroke-width="1.4"/>
      </svg>
      <span>PitStop</span>
    </div>
    <div id="topbar-actions">
      <button id="change-key-btn" title="Change Google Maps API key">API Key</button>
    </div>
  </header>

  <div id="body">

    <aside id="sidebar">
      <div id="tabs">
        <button class="tab-btn active" data-tab="network">Network</button>
        <button class="tab-btn" data-tab="site-selection">Site Selection</button>
      </div>

      <div id="tab-network" class="tab-panel active">
        <div id="status-summary"></div>
        <div id="list-controls">
          <button id="sort-alpha-btn" class="secondary-btn">Sort A–Z</button>
        </div>
        <div id="station-list"></div>
      </div>

      <div id="tab-site-selection" class="tab-panel">
        <div id="weights">
          <h3>Scoring weights</h3>
          <label>Traffic / footfall
            <input type="range" min="0" max="100" value="30" data-weight="traffic" />
          </label>
          <label>Competitor EV density (lower is better)
            <input type="range" min="0" max="100" value="20" data-weight="competition" />
          </label>
          <label>Highway / arterial proximity
            <input type="range" min="0" max="100" value="25" data-weight="highway" />
          </label>
          <label>Nearby demand generators (malls, offices)
            <input type="range" min="0" max="100" value="25" data-weight="demand" />
          </label>
        </div>
        <button id="score-btn">Score candidate sites (Places API)</button>
        <div id="ranked-list"></div>
      </div>

      <div id="site-detail" class="hidden">
        <button id="close-detail">&times;</button>
        <div id="site-detail-content"></div>
      </div>
    </aside>

    <main id="map-wrap">
      <div id="map"></div>
    </main>

  </div>
</div>

<div id="key-modal" class="modal hidden">
  <div class="modal-box">
    <h2>Google Maps API Key</h2>
    <p>Enter a key with the <b>Maps JavaScript API</b>, <b>Places API (New)</b>, and <b>Routes API</b> enabled, restricted to
      <code>http://localhost:8001/*</code>. It's stored only in this browser's localStorage.</p>
    <input id="key-input" type="text" placeholder="AIza..." autocomplete="off" />
    <button id="key-save-btn">Save &amp; Load Map</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
